<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Advertisement</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <script type="text/javascript">
      // Parse query parameters
      const params = new URLSearchParams(window.location.search);
      const key = params.get('key');
      const width = parseInt(params.get('width') || '0', 10);
      const height = parseInt(params.get('height') || '0', 10);

      if (key && width && height) {
        // Define global atOptions for Adsterra to read
        window.atOptions = {
          'key' : key,
          'format' : 'iframe',
          'height' : height,
          'width' : width,
          'params' : {}
        };

        // Create configuration script
        const confScript = document.createElement('script');
        confScript.type = 'text/javascript';
        confScript.innerHTML = `
          atOptions = {
            'key' : '${key}',
            'format' : 'iframe',
            'height' : ${height},
            'width' : ${width},
            'params' : {}
          };
        `;
        document.body.appendChild(confScript);

        // Create invoke script
        const invokeScript = document.createElement('script');
        invokeScript.type = 'text/javascript';
        invokeScript.src = `https://glamournakedemployee.com/${key}/invoke.js`;
        document.body.appendChild(invokeScript);
      }
    </script>
  </body>
</html>
