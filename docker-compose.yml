version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eporner_db
    environment:
      POSTGRES_USER: eporner
      POSTGRES_PASSWORD: eporner_password
      POSTGRES_DB: eporner_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eporner_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eporner_web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://eporner:eporner_password@db:5432/eporner_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: eporner_worker
    environment:
      - DATABASE_URL=postgresql://eporner:eporner_password@db:5432/eporner_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
