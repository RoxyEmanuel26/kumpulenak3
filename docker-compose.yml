services:
  db:
    image: postgres:15.13-alpine
    container_name: app_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    # No ports exposed — only accessible within Docker network
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # Memory limit: PostgreSQL needs enough for shared_buffers + working sets.
    # 512MB is conservative — increase to 1g on servers with >4GB RAM.
    mem_limit: 512m
    memswap_limit: 512m  # Disable swap extension (mem == memswap = no swap)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: app_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 96mb --maxmemory-policy allkeys-lru
    # No ports exposed — only accessible within Docker network
    volumes:
      - redisdata:/data
    restart: unless-stopped
    # Memory limit: Redis is configured with --maxmemory 96mb above.
    # Container limit is 128mb to allow OS overhead above the Redis maxmemory.
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-appdb}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Memory limit: Next.js standalone + Node.js runtime.
    # 512MB supports most traffic loads. Increase to 1g if you see OOM kills.
    mem_limit: 512m
    memswap_limit: 512m

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: app_worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-appdb}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Memory limit: BullMQ worker + Gemini API calls. 256MB is sufficient.
    mem_limit: 256m
    memswap_limit: 256m

volumes:
  pgdata:
  redisdata:
